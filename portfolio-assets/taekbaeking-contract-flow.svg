<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .label { font: 800 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .tag { font: 800 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #d9deea; stroke-width: 2; rx: 22; }
      .blue { fill: #2563eb; }
      .green { fill: #16a34a; }
      .orange { fill: #f97316; }
      .purple { fill: #7c3aed; }
      .line { stroke: #98a2b3; stroke-width: 4; fill: none; stroke-linecap: round; }
      .arrow { fill: #98a2b3; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="810"/>
  <text class="title" x="80" y="92">택배왕 핵심 계약 흐름</text>
  <text class="subtitle" x="80" y="130">화주 배송 수요를 계약 요청으로 공개하고, 대리점 제안과 비교를 거쳐 최종 계약으로 확정하는 구조</text>

  <rect class="card" x="80" y="220" width="220" height="190"/>
  <rect class="blue" x="108" y="248" width="72" height="34" rx="17"/>
  <text class="tag" x="127" y="271">화주</text>
  <text class="label" x="108" y="322">배송 수요 등록</text>
  <text class="small" x="108" y="360">품목, 박스, 단가</text>
  <text class="small" x="108" y="388">회수/배송 조건</text>

  <path class="line" d="M310 315 H420"/>
  <polygon class="arrow" points="420,315 404,304 404,326"/>

  <rect class="card" x="440" y="220" width="250" height="190"/>
  <rect class="purple" x="468" y="248" width="110" height="34" rx="17"/>
  <text class="tag" x="487" y="271">요청 단계</text>
  <text class="label" x="468" y="322">ContractRequest</text>
  <text class="small" x="468" y="360">OPEN 상태 일감</text>
  <text class="small" x="468" y="388">items[] 품목 라인</text>

  <path class="line" d="M700 315 H810"/>
  <polygon class="arrow" points="810,315 794,304 794,326"/>

  <rect class="card" x="830" y="220" width="250" height="190"/>
  <rect class="orange" x="858" y="248" width="110" height="34" rx="17"/>
  <text class="tag" x="877" y="271">제안 단계</text>
  <text class="label" x="858" y="322">Proposal</text>
  <text class="small" x="858" y="360">대리점별 단가 제안</text>
  <text class="small" x="858" y="388">품목 라인별 조율</text>

  <path class="line" d="M1090 315 H1200"/>
  <polygon class="arrow" points="1200,315 1184,304 1184,326"/>

  <rect class="card" x="1220" y="220" width="180" height="190"/>
  <rect class="green" x="1248" y="248" width="110" height="34" rx="17"/>
  <text class="tag" x="1267" y="271">확정 단계</text>
  <text class="label" x="1248" y="322">Contract</text>
  <text class="small" x="1248" y="360">최종 조건 보존</text>
  <text class="small" x="1248" y="388">계약 snapshot</text>

  <rect class="card" x="180" y="500" width="1080" height="220"/>
  <text class="label" x="220" y="558">설계 포인트</text>
  <circle class="blue" cx="240" cy="606" r="9"/>
  <text class="small" x="262" y="612">대리점은 배송 품목 템플릿이 아니라 공개 계약 요청을 일감으로 조회</text>
  <circle class="orange" cx="240" cy="646" r="9"/>
  <text class="small" x="262" y="652">제안은 비공개 입찰이며, 화주가 조건을 비교한 뒤 하나를 선택</text>
  <circle class="green" cx="240" cy="686" r="9"/>
  <text class="small" x="262" y="692">최종 계약은 요청과 제안의 확정 조건을 snapshot으로 보존</text>
</svg>
