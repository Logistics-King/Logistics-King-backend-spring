<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 24; }
      .head { font: 800 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .state { font: 800 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .desc { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .pill1 { fill: #2563eb; }
      .pill2 { fill: #f59e0b; }
      .pill3 { fill: #059669; }
      .pill4 { fill: #dc2626; }
      .line { stroke: #94a3b8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" width="1440" height="810"/>
  <text class="title" x="80" y="88">계약 생명주기와 상태 전이</text>
  <text class="subtitle" x="80" y="126">요청, 제안, 최종 계약을 분리해 변경 가능한 단계와 보존해야 하는 단계를 나눈 구조</text>

  <rect class="lane" x="80" y="190" width="1280" height="150"/>
  <text class="head" x="120" y="245">ContractRequest</text>
  <rect class="pill1" x="410" y="220" width="150" height="48" rx="24"/>
  <text class="state" x="457" y="252">OPEN</text>
  <path class="line" d="M570 244 H720"/>
  <rect class="pill3" x="740" y="220" width="190" height="48" rx="24"/>
  <text class="state" x="783" y="252">CONTRACTED</text>
  <path class="line" d="M570 284 H720"/>
  <rect class="pill4" x="740" y="270" width="160" height="48" rx="24"/>
  <text class="state" x="785" y="302">REJECTED</text>
  <text class="desc" x="120" y="292">화주가 만든 공개 일감. 확정 이후 수정 제한.</text>

  <rect class="lane" x="80" y="380" width="1280" height="150"/>
  <text class="head" x="120" y="435">Proposal</text>
  <rect class="pill2" x="410" y="410" width="190" height="48" rx="24"/>
  <text class="state" x="449" y="442">SUBMITTED</text>
  <path class="line" d="M610 434 H735"/>
  <rect class="pill3" x="755" y="410" width="160" height="48" rx="24"/>
  <text class="state" x="789" y="442">ACCEPTED</text>
  <path class="line" d="M610 474 H735"/>
  <rect class="pill4" x="755" y="460" width="160" height="48" rx="24"/>
  <text class="state" x="793" y="492">REJECTED</text>
  <rect class="pill4" x="960" y="460" width="170" height="48" rx="24"/>
  <text class="state" x="994" y="492">WITHDRAWN</text>
  <text class="desc" x="120" y="482">대리점 비공개 입찰. 하나가 수락되면 나머지는 자동 거절.</text>

  <rect class="lane" x="80" y="570" width="1280" height="150"/>
  <text class="head" x="120" y="625">Contract</text>
  <rect class="pill3" x="410" y="600" width="170" height="48" rx="24"/>
  <text class="state" x="457" y="632">ACTIVE</text>
  <path class="line" d="M590 624 H735"/>
  <rect class="pill4" x="755" y="600" width="180" height="48" rx="24"/>
  <text class="state" x="802" y="632">CANCELED</text>
  <text class="desc" x="120" y="672">확정된 합의 결과. 요청/제안의 핵심 조건을 snapshot으로 보존.</text>
</svg>
