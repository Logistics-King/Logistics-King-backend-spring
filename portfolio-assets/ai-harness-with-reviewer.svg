<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .card { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 22; }
      .review { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 22; }
      .verify { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 22; }
      .h { font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .t { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .small { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .num { font: 900 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .blue { fill: #2563eb; }
      .purple { fill: #7c3aed; }
      .orange { fill: #f97316; }
      .green { fill: #059669; }
      .teal { fill: #0f766e; }
      .line { stroke: #94a3b8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #f97316; stroke-width: 4; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrowOrange); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="810"/>
  <text class="title" x="80" y="86">AI 하네스 기반 개발 구조</text>
  <text class="subtitle" x="80" y="124">요구사항을 문서화하고, 구현 Agent와 Reviewer Agent를 거쳐 검증/전달/커밋까지 관리</text>

  <rect class="card" x="80" y="215" width="190" height="190"/>
  <circle class="blue" cx="122" cy="260" r="26"/>
  <text class="num" x="115" y="268">1</text>
  <text class="h" x="112" y="320">요구사항</text>
  <text class="t" x="112" y="360">대화 / 기획</text>

  <path class="line" d="M280 310 H355"/>

  <rect class="card" x="375" y="215" width="210" height="190"/>
  <circle class="purple" cx="417" cy="260" r="26"/>
  <text class="num" x="410" y="268">2</text>
  <text class="h" x="407" y="320">도메인 문서</text>
  <text class="t" x="407" y="360">domain.md</text>
  <text class="t" x="407" y="388">AGENTS.md</text>

  <path class="line" d="M595 310 H670"/>

  <rect class="card" x="690" y="215" width="210" height="190"/>
  <circle class="blue" cx="732" cy="260" r="26"/>
  <text class="num" x="725" y="268">3</text>
  <text class="h" x="722" y="320">구현 Agent</text>
  <text class="t" x="722" y="360">기능 구현</text>
  <text class="t" x="722" y="388">테스트 추가</text>

  <path class="line" d="M910 310 H985"/>

  <rect class="review" x="1005" y="215" width="260" height="190"/>
  <circle class="orange" cx="1047" cy="260" r="26"/>
  <text class="num" x="1040" y="268">4</text>
  <text class="h" x="1037" y="315">Reviewer Agent</text>
  <text class="small" x="1037" y="355">아키텍처 경계</text>
  <text class="small" x="1037" y="383">도메인 규칙 / 테스트 누락</text>

  <path class="loop" d="M1135 205 C1110 120 785 120 780 205"/>
  <text class="small" x="875" y="146">수정 필요 시 구현 Agent로 피드백</text>

  <path class="line" d="M1135 420 V500"/>

  <rect class="verify" x="935" y="520" width="400" height="150"/>
  <circle class="green" cx="980" cy="585" r="26"/>
  <text class="num" x="973" y="593">5</text>
  <text class="h" x="1020" y="575">검증</text>
  <text class="t" x="1020" y="615">compileKotlin / test / API 테스트</text>

  <path class="line" d="M925 595 H800"/>

  <rect class="card" x="480" y="520" width="300" height="150"/>
  <circle class="teal" cx="525" cy="585" r="26"/>
  <text class="num" x="518" y="593">6</text>
  <text class="h" x="565" y="575">전달 / 기록</text>
  <text class="t" x="565" y="615">API Handoff</text>
  <text class="t" x="565" y="643">Commit Splitter</text>

  <path class="line" d="M470 595 H345"/>

  <rect class="card" x="105" y="520" width="220" height="150"/>
  <circle class="purple" cx="150" cy="585" r="26"/>
  <text class="num" x="143" y="593">7</text>
  <text class="h" x="190" y="575">문서 최신화</text>
  <text class="t" x="190" y="615">작업 맥락 보존</text>

  <path class="line" d="M215 510 V425"/>
  <text class="small" x="230" y="470">새 정책은 문서로 환류</text>
</svg>
