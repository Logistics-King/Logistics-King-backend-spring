<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .card { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 24; }
      .h { font: 800 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .t { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .step { font: 900 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .circle1 { fill: #2563eb; }
      .circle2 { fill: #7c3aed; }
      .circle3 { fill: #f59e0b; }
      .circle4 { fill: #059669; }
      .circle5 { fill: #0f766e; }
      .line { stroke: #94a3b8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" width="1440" height="810"/>
  <text class="title" x="80" y="90">AI 하네스 기반 백엔드 개발 흐름</text>
  <text class="subtitle" x="80" y="128">요구사항, 구현, 검증, API handoff를 반복 가능한 작업 흐름으로 관리</text>

  <rect class="card" x="90" y="230" width="220" height="230"/>
  <circle class="circle1" cx="135" cy="280" r="28"/>
  <text class="step" x="128" y="288">1</text>
  <text class="h" x="125" y="340">요구사항 정리</text>
  <text class="t" x="125" y="382">domain.md</text>
  <text class="t" x="125" y="412">architecture.md</text>

  <path class="line" d="M320 345 H410"/>

  <rect class="card" x="430" y="230" width="220" height="230"/>
  <circle class="circle2" cx="475" cy="280" r="28"/>
  <text class="step" x="468" y="288">2</text>
  <text class="h" x="465" y="340">구현 분해</text>
  <text class="t" x="465" y="382">app/domain/infra</text>
  <text class="t" x="465" y="412">usecase 중심</text>

  <path class="line" d="M660 345 H750"/>

  <rect class="card" x="770" y="230" width="220" height="230"/>
  <circle class="circle3" cx="815" cy="280" r="28"/>
  <text class="step" x="808" y="288">3</text>
  <text class="h" x="805" y="340">검증</text>
  <text class="t" x="805" y="382">compileKotlin</text>
  <text class="t" x="805" y="412">test / curl</text>

  <path class="line" d="M1000 345 H1090"/>

  <rect class="card" x="1110" y="230" width="240" height="230"/>
  <circle class="circle4" cx="1155" cy="280" r="28"/>
  <text class="step" x="1148" y="288">4</text>
  <text class="h" x="1145" y="340">API Handoff</text>
  <text class="t" x="1145" y="382">프론트 스레드 전달</text>
  <text class="t" x="1145" y="412">요청/응답 계약 공유</text>

  <rect class="card" x="330" y="560" width="780" height="130"/>
  <circle class="circle5" cx="380" cy="625" r="30"/>
  <text class="step" x="373" y="633">5</text>
  <text class="h" x="430" y="610">작업 이력 보존</text>
  <text class="t" x="430" y="650">domain 문서 최신화, API 변경 handoff, commit-splitter로 의도 단위 커밋</text>
</svg>
